<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Personal</title>
    <style>
        /* Estilos básicos para que se vea moderno */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 800px;
            margin: auto;
            overflow: hidden;
            padding: 20px;
        }
        /* Ajuste para que las imágenes no se salgan de la pantalla del celular */
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 10px auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bienvenido a mi Sitio</h1>
        <p>Personal y Académico</p>
    </header>

    <div class="container">
        <h2>Mi Galería</h2>
        
        <div class="gallery">
            <div class="card">
                <h3>Imagen Principal</h3>
                <img src="heroimagen1.jpg" alt="Hero Imagen">
            </div>

            <div class="card">
                <h3>Filosofía 1</h3>
                <img src="filosofiaimagen1.jpg" alt="Filosofía 1">
            </div>

            <div class="card">
                <h3>Producto 1</h3>
                <img src="producto1.jpg" alt="Producto 1">
            </div>
            
            </div>
    </div>

</body>
</html>
