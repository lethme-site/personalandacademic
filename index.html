<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Personal y Académico</title>
    <style>
        /* Estilos para que se vea bien en celulares */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        header {
            background-color: #1a2a6c;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
        }
        h2 {
            border-bottom: 2px solid #1a2a6c;
            padding-bottom: 10px;
        }
        /* Galería que se ajusta sola */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .tarjeta {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            padding-bottom: 15px;
        }
        /* Esto hace que las fotos no se rompan en el móvil */
        img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Recorta la imagen para que todas midan lo mismo */
            display: block;
        }
        p {
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mi Portafolio Académico</h1>
        <p>Bienvenido a mi sitio web de prueba</p>
    </header>

    <div class="container">
        
        <h2>Sección Principal</h2>
        <div class="tarjeta">
            <img src="heroimagen1.jpg" alt="Imagen Hero">
            <p><strong>Hero Principal</strong></p>
        </div>

        <h2>Filosofía</h2>
        <div class="galeria">
            <div class="tarjeta">
                <img src="filosofiaimagen1.jpg" alt="Filosofía 1">
                <p>Filosofía Parte 1</p>
            </div>
            <div class="tarjeta">
                <img src="filosofiaimagen2.jpg" alt="Filosofía 2">
                <p>Filosofía Parte 2</p>
            </div>
        </div>

        <h2>Productos y Proyectos</h2>
        <div class="galeria">
            <div class="tarjeta"><img src="producto1.jpg" alt="Producto 1"><p>Producto 1</p></div>
            <div class="tarjeta"><img src="producto10.jpg" alt="Producto 10"><p>Producto 10</p></div>
            <div class="tarjeta"><img src="producto11.jpg" alt="Producto 11"><p>Producto 11</p></div>
            <div class="tarjeta"><img src="producto12.jpg" alt="Producto 12"><p>Producto 12</p></div>
            <div class="tarjeta"><img src="producto13.jpg" alt="Producto 13"><p>Producto 13</p></div>
            <div class="tarjeta"><img src="producto14.jpg" alt="Producto 14"><p>Producto 14</p></div>
        </div>

    </div>

</body>
</html>
